<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Математическое сердце</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e78fb3; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        canvas { 
            background-color: #121212; 
        }
        .title { 
            margin-bottom: 5px; 
            font-size: 18px; 
            text-shadow: 0 0 10px rgba(231,143,179,0.5); 
            text-align: center;
        }
        .formula {
            color: #8fa3e7;
            font-size: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            background: #1a1a1a;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="title">Инициализация... Семья кривых успешно построена! ❤️</div>
    <!-- Выводим формулу на экран, чтобы он её сразу оценил -->
    <div class="formula">(sin(πa/10) + x)² + (cos(πa/10) + y)² = 0.7·y·|x| + 1</div>
    
    <canvas id="heart" width="600" height="600"></canvas>
    
    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');

        const scale = 110; 
        ctx.translate(canvas.width / 2, canvas.height / 2 + 50);
        ctx.scale(scale, -scale); 

        function getHeartY(x, a) {
            const sinPart = Math.sin((Math.PI * a) / 10);
            const cosPart = Math.cos((Math.PI * a) / 10);
            
            const b = 2 * cosPart - 0.7 * Math.abs(x);
            const c = Math.pow(sinPart + x, 2) + Math.pow(cosPart, 2) - 1;
            
            const discriminant = b * b - 4 * c;
            if (discriminant < 0) return null;
            
            return (-b + Math.sqrt(discriminant)) / 2;
        }

        let currentA = 1;

        function draw() {
            if (currentA > 20) return; 

            ctx.strokeStyle = "rgba(231, 143, 179, 0.7)"; 
            ctx.lineWidth = 1.8 / scale; 
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#e78fb3";

            ctx.beginPath();
            let first = true;

            for (let x = -2.5; x <= 2.5; x += 0.005) {
                let y = getHeartY(x, currentA);
                if (y !== null) {
                    if (first) {
                        ctx.moveTo(x, y);
                        first = false;
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
            }
            ctx.stroke();

            currentA += 1;
            setTimeout(draw, 200); 
        }

        draw();
    </script>
</body>
</html>
