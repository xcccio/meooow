<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Математическое сердце</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: #e78fb3; 
            font-family: 'Consolas', 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 600px;
            height: 600px;
        }
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
        }
        #gridCanvas {
            z-index: 1;
        }
        #heartCanvas {
            z-index: 2;
        }
        .title { 
            margin-bottom: 10px; 
            font-size: 20px; 
            text-shadow: 0 0 10px rgba(231,143,179,0.5); 
            text-align: center;
        }
        .formula {
            color: #8fa3e7;
            font-size: 24px; /* Крупный и четкий шрифт */
            margin-bottom: 20px;
            font-weight: bold;
            background: #141414;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #333;
            text-shadow: 0 0 5px rgba(143,163,231,0.3);
        }
    </style>
</head>
<body>
    <div class="title">мяу мяу мяу... ради тебя готова на всё! ❤️</div>
    <div class="formula">(sin(πa/10) + x)² + (cos(πa/10) + y)² = 0.7·y·|x| + 1</div>
    
    <div class="container">
        <!-- Сетка на заднем плане -->
        <canvas id="gridCanvas" width="600" height="600"></canvas>
        <!-- Само сердце -->
        <canvas id="heartCanvas" width="600" height="600"></canvas>
    </div>
    
    <script>
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        const gCanvas = document.getElementById('gridCanvas');
        const gCtx = gCanvas.getContext('2d');

        const scale = 110; 
        
        // Настройка осей координат для обоих холстов
        [hCtx, gCtx].forEach(ctx => {
            ctx.translate(canvasWidth() / 2, canvasHeight() / 2 + 30);
            ctx.scale(scale, -scale); 
        });

        function canvasWidth() { return 600; }
        function canvasHeight() { return 600; }

        // Рисуем математическую сетку, как на картинке
        function drawGrid() {
            gCtx.strokeStyle = "#1a1a1a";
            gCtx.lineWidth = 0.5 / scale;
            
            // Мелкая сетка
            for (let i = -3; i <= 3; i += 0.1) {
                gCtx.beginPath(); gCtx.moveTo(i, -3); gCtx.lineTo(i, 3); gCtx.stroke();
                gCtx.beginPath(); gCtx.moveTo(-3, i); gCtx.lineTo(3, i); gCtx.stroke();
            }
            
            // Крупная сетка
            gCtx.strokeStyle = "#2a2a2a";
            gCtx.lineWidth = 1 / scale;
            for (let i = -3; i <= 3; i += 0.5) {
                gCtx.beginPath(); gCtx.moveTo(i, -3); gCtx.lineTo(i, 3); gCtx.stroke();
                gCtx.beginPath(); gCtx.moveTo(-3, i); gCtx.lineTo(3, i); gCtx.stroke();
            }

            // Главные оси X и Y
            gCtx.strokeStyle = "#444444";
            gCtx.lineWidth = 1.5 / scale;
            gCtx.beginPath(); gCtx.moveTo(-3, 0); gCtx.lineTo(3, 0); gCtx.stroke();
            gCtx.beginPath(); gCtx.moveTo(0, -3); gCtx.lineTo(0, 3); gCtx.stroke();
        }

        // Точное математическое решение уравнения для обеих половинок (включая нижнюю)
        function drawHeartFamilyLine(a) {
            hCtx.beginPath();
            
            const sinPart = Math.sin((Math.PI * a) / 10);
            const cosPart = Math.cos((Math.PI * a) / 10);

            // Рисуем верхнюю (+) и нижнюю (-) части графика для идеального контура
            for (let sign of [1, -1]) {
                let first = true;
                hCtx.beginPath();
                
                for (let x = -3; x <= 3; x += 0.005) {
                    const b = 2 * cosPart - 0.7 * Math.abs(x);
                    const c = Math.pow(sinPart + x, 2) + Math.pow(cosPart, 2) - 1;
                    
                    const discriminant = b * b - 4 * c;
                    if (discriminant >= 0) {
                        const y = (-b + sign * Math.sqrt(discriminant)) / 2;
                        if (first) {
                            hCtx.moveTo(x, y);
                            first = false;
                        } else {
                            hCtx.lineTo(x, y);
                        }
                    }
                }
                hCtx.stroke();
            }
        }

        let currentA = 1;

        function draw() {
            if (currentA > 20) return; 

            hCtx.strokeStyle = "rgba(231, 143, 179, 0.75)"; 
            hCtx.lineWidth = 1.8 / scale; 
            hCtx.shadowBlur = 6;
            hCtx.shadowColor = "#e78fb3";

            drawHeartFamilyLine(currentA);

            currentA += 1;
            setTimeout(draw, 500); // Медленная, затягивающая анимация (полсекунды на линию)
        }

        drawGrid();
        draw();
    </script>
</body>
</html>
